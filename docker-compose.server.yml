services:

  # ─────────────────────────────────────────────────────────────────────────────
  # BASES DE DATOS — completamente aisladas
  # ─────────────────────────────────────────────────────────────────────────────
  db_staging:
    image: postgres:15-alpine
    container_name: db_staging
    volumes:
      - postgres_staging:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB:       ${STAGING_DB_NAME}
      POSTGRES_USER:     ${STAGING_DB_USER}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_DB_USER} -d ${STAGING_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db_production:
    image: postgres:15-alpine
    container_name: db_production
    volumes:
      - postgres_production:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB:       ${PROD_DB_NAME}
      POSTGRES_USER:     ${PROD_DB_USER}
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_DB_USER} -d ${PROD_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # WEB — dos instancias independientes de Django/Gunicorn
  # ─────────────────────────────────────────────────────────────────────────────
  web_staging:
    build:
      context: /srv/planificador_rutas
    container_name: staging_web
    volumes:
      - static_staging:/app/staticfiles
      - media_staging:/app/media
    env_file: /srv/planificador_rutas/.env.staging
    environment:
      DB_HOST: db_staging
    depends_on:
      db_staging:
        condition: service_healthy
    restart: unless-stopped

  web_production:
    build:
      context: /srv/planificador_rutas_prod
    container_name: production_web
    volumes:
      - static_production:/app/staticfiles
      - media_production:/app/media
    env_file: /srv/planificador_rutas_prod/.env.production
    environment:
      DB_HOST: db_production
    depends_on:
      db_production:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # NGINX — proxy inverso multi-dominio
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/planificador_rutas/nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - web_staging
      - web_production
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # CERTBOT — renovación automática SSL para ambos dominios
  # ─────────────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # DB SYNC — clona producción → staging cada sábado a las 02:00
  # ─────────────────────────────────────────────────────────────────────────────
  db_sync:
    image: postgres:15-alpine
    container_name: db_sync
    volumes:
      - /srv/planificador_rutas/scripts/db_sync.sh:/sync/db_sync.sh:ro
    environment:
      STAGING_DB_HOST:     db_staging
      STAGING_DB_NAME:     ${STAGING_DB_NAME}
      STAGING_DB_USER:     ${STAGING_DB_USER}
      STAGING_DB_PASSWORD: ${STAGING_DB_PASSWORD}
      PROD_DB_HOST:        db_production
      PROD_DB_NAME:        ${PROD_DB_NAME}
      PROD_DB_USER:        ${PROD_DB_USER}
      PROD_DB_PASSWORD:    ${PROD_DB_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mkdir -p /var/spool/cron/crontabs &&
        printf '0 2 * * 6\tsh /sync/db_sync.sh >> /var/log/db_sync.log 2>&1\n' > /var/spool/cron/crontabs/root &&
        chmod 600 /var/spool/cron/crontabs/root &&
        touch /var/log/db_sync.log &&
        crond -f -d 8"
    depends_on:
      - db_staging
      - db_production
    restart: unless-stopped

volumes:
  postgres_staging:
  postgres_production:
  static_staging:
  media_staging:
  static_production:
  media_production:
  certbot_webroot:
    name: proxy_certbot_webroot
  certbot_certs:
    name: proxy_certbot_certs
