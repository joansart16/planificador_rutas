{% extends "admin/base_site.html" %}

{% block title %}Exportar tareas por día{% endblock %}

{% block content %}
<h1>Exportar tareas por día</h1>
<p class="help">
  Selecciona la fecha y se descargará un Excel con las columnas de operación.
</p>

<form method="post">
  {% csrf_token %}
  <fieldset class="module aligned">
    <div class="form-row">
      <label for="target_date"><strong>Fecha:</strong></label>
      <input
        type="date"
        id="target_date"
        name="target_date"
        value="{{ target_date|date:'Y-m-d' }}"
        style="margin-left:.5rem;"
      >
      <button type="submit" class="button default" style="margin-left:.5rem;">
        Descargar Excel
      </button>
    </div>
  </fieldset>
</form>

<div style="margin-top: 2rem;">
  <a href="{% url 'admin:rutas_servicetask_changelist' %}" class="button">
    ← Volver a Tareas de servicio
  </a>
</div>
{% endblock %}
