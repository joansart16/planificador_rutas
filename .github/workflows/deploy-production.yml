name: Deploy · Production

on:
  # ── Botón manual en GitHub → Actions → "Deploy · Production" → "Run workflow"
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a desplegar (ej: 0.2.0)'
        required: true
        type: string

  # ── También se dispara al publicar un Release en GitHub
  release:
    types: [published]

jobs:
  deploy:
    name: SSH → EC2 (web_production)
    runs-on: ubuntu-latest

    steps:
      - name: Determinar versión
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      # ─── INICI BLOC DE SEGURETAT AWS ───
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-2

      - name: Open SSH port in AWS Security Group
        run: |
          # 1. Obtenim la IP pública actual de la màquina de GitHub Actions
          PUBLIC_IP=$(curl -s https://ifconfig.me)
          echo "La IP de GitHub és: $PUBLIC_IP"
          
          # 2. Autoritzem el port 22 temporalment només per a aquesta IP
          aws ec2 authorize-security-group-ingress \
            --region eu-south-2 \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${PUBLIC_IP}/32 \
            --tag-specifications 'ResourceType=security-group-rule,Tags=[{Key=Description,Value="GitHub Actions CI/CD"}]'
      # ─── FI BLOC DE SEGURETAT AWS ───
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key:      ${{ secrets.SSH_KEY }}
          timeout: 30s
          script: |
            set -e
            VERSION="${{ steps.ver.outputs.version }}"

            echo "──── Actualizando código de producción a ${VERSION} ────"
            cd /srv/planificador_rutas_prod
            git fetch --tags --force origin
            git checkout "${VERSION}"

            echo "──── Actualizando archivos de infraestructura (master) ────"
            cd /srv/planificador_rutas
            git pull origin master

            echo "──── Rebuild producción ────"
            docker compose --env-file .env.server -f docker-compose.server.yml up -d --build web_production

            echo "──── Limpiar imágenes antiguas ────"
            docker image prune -f

            echo "──── Estado final ────"
            docker compose --env-file .env.server -f docker-compose.server.yml ps

            echo "──── Versión desplegada ────"
            cat /srv/planificador_rutas_prod/VERSION
      - name: Close SSH port in AWS Security Group
        if: always()
        run: |
          # Tornem a demanar la IP per saber quina hem d'esborrar
          PUBLIC_IP=$(curl -s https://ifconfig.me)
          
          # Revoquem l'accés al port 22 per a aquesta IP concreta
          aws ec2 revoke-security-group-ingress \
            --region eu-south-2 \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${PUBLIC_IP}/32
