name: Deploy · Staging

on:
  push:
    branches:
      - master
      - main
      - develop

jobs:
  deploy:
    name: SSH → EC2 (web_staging)
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key:      ${{ secrets.SSH_KEY }}
          connect_timeout: 30s
          script: |
            set -e

            cd /srv/planificador_rutas

            echo "──── git pull ────"
            git pull origin master

            echo "──── rebuild staging ────"
            docker compose --env-file .env.server -f docker-compose.server.yml up -d --build web_staging

            echo "──── limpiar imágenes antiguas ────"
            docker image prune -f

            echo "──── estado final ────"
            docker compose --env-file .env.server -f docker-compose.server.yml ps
