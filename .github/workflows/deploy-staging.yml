name: Deploy · Staging

on:
  push:
    branches:
      - master
      - main
      - develop

# Evitar loops: no ejecutar si el commit es el propio bump de versión
jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Bump version + SSH → EC2 (web_staging)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump versión patch
        id: ver
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Versión: $VERSION → $NEW_VERSION"

      - name: Commit VERSION + crear tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "v${{ steps.ver.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.ver.outputs.new_version }}"
          git push origin master
          git push origin "v${{ steps.ver.outputs.new_version }}"
      # ─── INICI BLOC DE SEGURETAT AWS ───
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-2

      - name: Open SSH port in AWS Security Group
        uses: sohelamin/aws-security-group-add-ip-action@v1.0.1
        with:
          aws-security-group-id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          port: 22
          to-port: 22
          protocol: tcp
          description: "GitHub Actions CI/CD Staging"
      # ─── FI BLOC DE SEGURETAT AWS ───
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /srv/planificador_rutas

            echo "──── git pull ────"
            git pull origin master

            echo "──── rebuild staging ────"
            docker compose --env-file .env.server -f docker-compose.server.yml up -d --build web_staging

            echo "──── limpiar imágenes antiguas ────"
            docker image prune -f

            echo "──── estado final ────"
            docker compose --env-file .env.server -f docker-compose.server.yml ps
