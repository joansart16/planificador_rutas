# Upstream: Gunicorn dentro del contenedor web
upstream django {
    server web:8000;
}

# ─── HTTP ────────────────────────────────────────────────────────────────────
# Sirve el challenge de Let's Encrypt y redirige todo lo demás a HTTPS.
server {
    listen      80;
    listen      [::]:80;
    server_name planificador.desenvolupament.sarts.dev;

    # Certbot escribe aquí el token ACME; el contenedor certbot lee del mismo volumen
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name planificador.desenvolupament.sarts.dev;

    ssl_certificate     /etc/letsencrypt/live/planificador.desenvolupament.sarts.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planificador.desenvolupament.sarts.dev/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Cabeceras de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 20M;

    # Archivos estáticos — servidos por Nginx, sin tocar Django
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Archivos de media (subidos por usuarios)
    location /media/ {
        alias   /app/media/;
        expires 7d;
        access_log off;
    }

    # Todo lo demás → Gunicorn
    location / {
        proxy_pass            http://django;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  https;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }
}
