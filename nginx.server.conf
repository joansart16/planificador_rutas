upstream staging    { server staging_web:8000; }
upstream production { server production_web:8000; }

# ─── HTTP ─────────────────────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name planificador.desenvolupament.sarts.dev planificador.sarts.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Staging ────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name planificador.desenvolupament.sarts.dev;

    ssl_certificate     /etc/letsencrypt/live/planificador.desenvolupament.sarts.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planificador.desenvolupament.sarts.dev/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 20M;

    location / {
        proxy_pass            http://staging;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  https;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }
}

# ─── HTTPS Production ─────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name planificador.sarts.dev;

    ssl_certificate     /etc/letsencrypt/live/planificador.sarts.dev/fullchain.pem;
